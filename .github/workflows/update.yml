name: update-dataset

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Rebuild dataset
        run: python -m burner_radar build

      - name: Commit changes
        run: |
          git config user.name "burner-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git add data/
            git commit -m "data: daily rebuild $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes"
          fi
